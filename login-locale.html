<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NightLife - Locale</title>
  <link href="img/screenShot/Icon.jpg" rel="icon">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
    }

    .hero-logo {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      display: block;
      aspect-ratio: 16/9;
      background: #000;
      position: relative;
      overflow: hidden;
    }

    .hero-logo video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .page {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 20px 40px;
    }

    .badge-type {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin: 24px auto 20px;
      width: fit-content;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 50px;
      padding: 8px 20px;
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
    }

    .auth-title {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-title h1 {
      font-size: 1.75rem;
      font-weight: 800;
      margin-bottom: 6px;
      line-height: 1.2;
    }

    .auth-title p {
      color: #888;
      font-size: 0.9rem;
    }

    .form-screen { display: none; }
    .form-screen.active { display: block; }

    .field {
      display: flex;
      align-items: center;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 0 18px;
      height: 58px;
      margin-bottom: 14px;
      transition: border-color 0.2s;
    }

    .field:focus-within { border-color: #4a6fff; }

    .field .bi {
      color: #555;
      font-size: 1.05rem;
      flex-shrink: 0;
      margin-right: 12px;
    }

    .field input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
    }

    .field input::placeholder { color: #555; }

    .field .eye {
      cursor: pointer;
      color: #555;
      font-size: 1.05rem;
      flex-shrink: 0;
      margin-left: 8px;
      transition: color 0.2s;
    }
    .field .eye:hover { color: #aaa; }

    .privacy-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 6px 0 22px;
      font-size: 0.88rem;
      color: #aaa;
    }

    .toggle-wrap {
      position: relative;
      width: 46px;
      height: 26px;
      flex-shrink: 0;
    }

    .toggle-wrap input { display: none; }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 50px;
      cursor: pointer;
      transition: background 0.25s;
    }

    .toggle-slider::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      background: #fff;
      border-radius: 50%;
      top: 3px;
      left: 3px;
      transition: transform 0.25s;
    }

    .toggle-wrap input:checked + .toggle-slider { background: #4a6fff; }
    .toggle-wrap input:checked + .toggle-slider::after { transform: translateX(20px); }

    .privacy-row a { color: #4a9fff; text-decoration: none; font-weight: 600; }

    .btn-main {
      width: 100%;
      height: 56px;
      background: #2a4fff;
      border: none;
      border-radius: 14px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .btn-main:hover { background: #3a5fff; transform: translateY(-1px); }
    .btn-main:disabled { opacity: 0.5; transform: none; cursor: not-allowed; }

    .switch-link {
      text-align: center;
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 16px;
    }

    .switch-link a { color: #fff; text-decoration: none; font-weight: 700; cursor: pointer; }

    .alert-box {
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 16px;
      font-size: 0.88rem;
      font-weight: 500;
      display: none;
    }

    .alert-box.error { background: rgba(255,60,60,0.15); border: 1px solid rgba(255,60,60,0.3); color: #ff6b6b; }
    .alert-box.success { background: rgba(60,255,120,0.12); border: 1px solid rgba(60,255,120,0.3); color: #4dff90; }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="hero-logo">
    <video
      src="img/screenShot/video2.mp4"
      autoplay
      loop
      muted
      playsinline
      class="img-fluid"
      style="border-radius: 12px; margin-top: 40px;">
    </video>
  </div>

  <div class="page">

    <div class="badge-type">
      🍷 Locale
    </div>

    <div class="alert-box" id="alert"></div>

    <!-- LOGIN -->
    <div class="form-screen active" id="screen-login">
      <div class="auth-title">
        <h1>Bentornato</h1>
        <p>Accedi al tuo locale</p>
      </div>

      <div class="field">
        <i class="bi bi-envelope"></i>
        <input type="email" id="l-email" placeholder="Email">
      </div>
      <div class="field">
        <i class="bi bi-lock"></i>
        <input type="password" id="l-password" placeholder="Password">
        <i class="bi bi-eye eye" onclick="togglePwd('l-password', this)"></i>
      </div>

      <button class="btn-main" id="btn-login" onclick="doLogin()">
        <span>Accedi</span>
        <div class="spinner" id="spin-login"></div>
      </button>

      <div class="switch-link">Non hai un account? <a onclick="goScreen('register')">Registrati</a></div>
      <div class="switch-link">Sei un utente? <a href="login-utente.html">Accedi come Utente →</a></div>
    </div>

    <!-- REGISTER -->
    <div class="form-screen" id="screen-register">
      <div class="auth-title">
        <h1>Registra il tuo locale</h1>
        <p>Gestisci prenotazioni e clienti</p>
      </div>

      <div class="field">
        <i class="bi bi-person"></i>
        <input type="text" id="r-nome-locale" placeholder="Nome Locale / Azienda">
      </div>
      <div class="field">
        <i class="bi bi-person"></i>
        <input type="email" id="r-email" placeholder="Email">
      </div>
      <div class="field">
        <i class="bi bi-person"></i>
        <input type="text" id="r-piva" placeholder="Partita IVA">
      </div>
      <div class="field">
        <i class="bi bi-telephone"></i>
        <input type="tel" id="r-telefono" placeholder="Telefono">
      </div>
      <div class="field">
        <i class="bi bi-geo-alt"></i>
        <input type="text" id="r-indirizzo" placeholder="Indirizzo Locale">
      </div>
      <div class="field">
        <i class="bi bi-lock"></i>
        <input type="password" id="r-password" placeholder="Password">
        <i class="bi bi-eye eye" onclick="togglePwd('r-password', this)"></i>
      </div>
      <div class="field">
        <i class="bi bi-lock"></i>
        <input type="password" id="r-password2" placeholder="Repeat Password">
        <i class="bi bi-eye eye" onclick="togglePwd('r-password2', this)"></i>
      </div>

      <div class="privacy-row">
        <label class="toggle-wrap">
          <input type="checkbox" id="r-privacy">
          <div class="toggle-slider"></div>
        </label>
        <span>Ho letto e accetto la <a href="#">Privacy Policy</a></span>
      </div>

      <button class="btn-main" id="btn-register" onclick="doRegister()">
        <span>Registra Locale</span>
        <div class="spinner" id="spin-register"></div>
      </button>

      <div class="switch-link">Hai già un account? <a onclick="goScreen('login')"><strong>Accedi</strong></a></div>
    </div>

  </div>

 <script>
    const BASE_URL = 'https://nightlife-business.it/API';

    function goScreen(name) {
      document.querySelectorAll('.form-screen').forEach(s => s.classList.remove('active'));
      document.getElementById('screen-' + name).classList.add('active');
      hideAlert();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function togglePwd(id, icon) {
      const inp = document.getElementById(id);
      if (inp.type === 'password') {
        inp.type = 'text';
        icon.classList.replace('bi-eye', 'bi-eye-slash');
      } else {
        inp.type = 'password';
        icon.classList.replace('bi-eye-slash', 'bi-eye');
      }
    }

    function showAlert(msg, type = 'error') {
      const el = document.getElementById('alert');
      el.className = 'alert-box ' + type;
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideAlert() { document.getElementById('alert').style.display = 'none'; }

    function setLoading(btnId, spinId, on) {
      document.getElementById(btnId).disabled = on;
      document.getElementById(spinId).style.display = on ? 'block' : 'none';
    }

    async function doLogin() {
      const email = document.getElementById('l-email').value.trim();
      const password = document.getElementById('l-password').value;
      if (!email || !password) return showAlert('Inserisci email e password.');

      setLoading('btn-login', 'spin-login', true);
      hideAlert();
      try {
        const res = await fetch(`${BASE_URL}/token/GetToken?email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`);
        if (!res.ok) throw new Error(await res.text() || 'Credenziali non valide.');
        const token = await res.text();
        localStorage.setItem('authToken', token);
        localStorage.setItem('userType', 'owner');
        showAlert('Accesso effettuato!', 'success');
        setTimeout(() => window.location.href = 'dashboard.html', 1200);
      } catch(e) {
        showAlert(e.message || 'Errore di connessione.');
      } finally {
        setLoading('btn-login', 'spin-login', false);
      }
    }

    async function doRegister() {
      const nomeLocale = document.getElementById('r-nome-locale').value.trim();
      const email = document.getElementById('r-email').value.trim();
      const piva = document.getElementById('r-piva').value.trim();
      const telefono = document.getElementById('r-telefono').value.trim();
      const indirizzo = document.getElementById('r-indirizzo').value.trim();
      const password = document.getElementById('r-password').value;
      const password2 = document.getElementById('r-password2').value;
      const privacy = document.getElementById('r-privacy').checked;

      if (!nomeLocale || !email || !piva || !telefono || !indirizzo || !password) return showAlert('Compila tutti i campi.');
      if (password !== password2) return showAlert('Le password non coincidono.');
      if (!privacy) return showAlert('Devi accettare la Privacy Policy.');

      setLoading('btn-register', 'spin-register', true);
      hideAlert();
      try {
        const res = await fetch(`${BASE_URL}/user/Register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nomeLocale, email, piva, telefono, indirizzo, password, isOwner: true })
        });
        if (!res.ok) throw new Error(await res.text() || 'Registrazione fallita.');
        showAlert('Locale registrato! Ora accedi.', 'success');
        setTimeout(() => goScreen('login'), 1500);
      } catch(e) {
        showAlert(e.message || 'Errore di connessione.');
      } finally {
        setLoading('btn-register', 'spin-register', false);
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      if (document.getElementById('screen-login').classList.contains('active')) doLogin();
      else doRegister();
    });
  </script>
</body>
</html>
