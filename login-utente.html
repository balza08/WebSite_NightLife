<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NightLife - Utente</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
    }

    /* LOGO HERO */
    .hero-logo {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      display: block;
      aspect-ratio: 16/9;
      background: #000;
      position: relative;
      overflow: hidden;
    }

    .hero-logo canvas {
      width: 100%;
      height: 100%;
    }

    .nl-logo {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .nl-ring {
      position: absolute;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 3px solid transparent;
      background: linear-gradient(135deg, #3b5bff, #c03fff) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: destination-out;
      mask-composite: exclude;
      filter: drop-shadow(0 0 18px #7b2fff) drop-shadow(0 0 36px #3b5bff);
    }

    .nl-text {
      font-family: 'Inter', sans-serif;
      font-size: 3rem;
      font-weight: 800;
      font-style: italic;
      background: linear-gradient(135deg, #fff 30%, #c8a8ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      z-index: 1;
      letter-spacing: -2px;
    }

    .nl-glow {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 220px;
      height: 60px;
      background: radial-gradient(ellipse, rgba(100,60,255,0.5) 0%, rgba(180,60,255,0.3) 40%, transparent 70%);
      filter: blur(8px);
    }

    .nl-smoke-l {
      position: absolute;
      left: 60px;
      bottom: 10px;
      width: 100px;
      height: 80px;
      background: radial-gradient(ellipse, rgba(60,80,255,0.35) 0%, transparent 70%);
      filter: blur(12px);
    }

    .nl-smoke-r {
      position: absolute;
      right: 60px;
      bottom: 10px;
      width: 100px;
      height: 80px;
      background: radial-gradient(ellipse, rgba(180,40,255,0.35) 0%, transparent 70%);
      filter: blur(12px);
    }

    /* PAGE WRAPPER */
    .page {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 20px 40px;
    }

    /* BADGE */
    .badge-type {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin: 24px auto 20px;
      width: fit-content;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 50px;
      padding: 8px 20px;
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
    }

    /* TITLE */
    .auth-title {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-title h1 {
      font-size: 1.75rem;
      font-weight: 800;
      margin-bottom: 6px;
      line-height: 1.2;
    }

    .auth-title p {
      color: #888;
      font-size: 0.9rem;
      font-weight: 400;
    }

    /* FORM HIDDEN/VISIBLE */
    .form-screen { display: none; }
    .form-screen.active { display: block; }

    /* INPUT FIELDS */
    .field {
      display: flex;
      align-items: center;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 0 18px;
      height: 58px;
      margin-bottom: 14px;
      transition: border-color 0.2s;
    }

    .field:focus-within {
      border-color: #4a6fff;
    }

    .field .bi {
      color: #555;
      font-size: 1.05rem;
      flex-shrink: 0;
      margin-right: 12px;
    }

    .field input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 400;
    }

    .field input::placeholder { color: #555; }

    .field .eye {
      cursor: pointer;
      color: #555;
      font-size: 1.05rem;
      flex-shrink: 0;
      margin-left: 8px;
      transition: color 0.2s;
    }
    .field .eye:hover { color: #aaa; }

    /* PRIVACY TOGGLE */
    .privacy-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 6px 0 22px;
      font-size: 0.88rem;
      color: #aaa;
    }

    .toggle-wrap {
      position: relative;
      width: 46px;
      height: 26px;
      flex-shrink: 0;
    }

    .toggle-wrap input { display: none; }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 50px;
      cursor: pointer;
      transition: background 0.25s;
    }

    .toggle-slider::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      background: #fff;
      border-radius: 50%;
      top: 3px;
      left: 3px;
      transition: transform 0.25s;
    }

    .toggle-wrap input:checked + .toggle-slider { background: #4a6fff; }
    .toggle-wrap input:checked + .toggle-slider::after { transform: translateX(20px); }

    .privacy-row a { color: #4a9fff; text-decoration: none; font-weight: 600; }

    /* BUTTON */
    .btn-main {
      width: 100%;
      height: 56px;
      background: #2a4fff;
      border: none;
      border-radius: 14px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .btn-main:hover { background: #3a5fff; transform: translateY(-1px); }
    .btn-main:disabled { opacity: 0.5; transform: none; cursor: not-allowed; }

    /* SWITCH LINK */
    .switch-link {
      text-align: center;
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 20px;
    }

    .switch-link strong { color: #fff; cursor: pointer; }
    .switch-link a { color: #fff; text-decoration: none; font-weight: 700; }

    /* ALERT */
    .alert-box {
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 16px;
      font-size: 0.88rem;
      font-weight: 500;
      display: none;
    }

    .alert-box.error { background: rgba(255,60,60,0.15); border: 1px solid rgba(255,60,60,0.3); color: #ff6b6b; }
    .alert-box.success { background: rgba(60,255,120,0.12); border: 1px solid rgba(60,255,120,0.3); color: #4dff90; }

    /* SPINNER */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- LOGO HERO -->
  <div class="hero-logo">
    <div class="nl-logo">
      <div class="nl-smoke-l"></div>
      <div class="nl-smoke-r"></div>
      <div class="nl-glow"></div>
      <div class="nl-ring"></div>
      <div class="nl-text">NL</div>
    </div>
  </div>

  <div class="page">

    <!-- BADGE -->
    <div class="badge-type">
      <i class="bi bi-person-fill" style="color:#4a9fff"></i>
      Utente
    </div>

    <!-- ALERT -->
    <div class="alert-box" id="alert"></div>

    <!-- LOGIN SCREEN -->
    <div class="form-screen active" id="screen-login">
      <div class="auth-title">
        <h1>Bentornato</h1>
        <p>Accedi al tuo account</p>
      </div>

      <div class="field">
        <i class="bi bi-envelope"></i>
        <input type="email" id="l-email" placeholder="Email">
      </div>
      <div class="field">
        <i class="bi bi-lock"></i>
        <input type="password" id="l-password" placeholder="Password">
        <i class="bi bi-eye eye" onclick="togglePwd('l-password', this)"></i>
      </div>

      <button class="btn-main" id="btn-login" onclick="doLogin()">
        <span>Accedi</span>
        <div class="spinner" id="spin-login"></div>
      </button>

      <div class="switch-link">Hai già un account? <a onclick="goScreen('register')">Registrati</a></div>
      <div class="switch-link">Sei un locale? <a href="login-locale.html">Accedi come Owner →</a></div>
    </div>

    <!-- REGISTER SCREEN -->
    <div class="form-screen" id="screen-register">
      <div class="auth-title">
        <h1>Crea il tuo account</h1>
        <p>Scopri e prenota i migliori locali</p>
      </div>

      <div class="field">
        <i class="bi bi-person"></i>
        <input type="text" id="r-nome" placeholder="Nome">
      </div>
      <div class="field">
        <i class="bi bi-person"></i>
        <input type="text" id="r-cognome" placeholder="Cognome">
      </div>
      <div class="field">
        <i class="bi bi-person"></i>
        <input type="email" id="r-email" placeholder="Email">
      </div>
      <div class="field">
        <i class="bi bi-lock"></i>
        <input type="password" id="r-password" placeholder="Password">
        <i class="bi bi-eye eye" onclick="togglePwd('r-password', this)"></i>
      </div>
      <div class="field">
        <i class="bi bi-lock"></i>
        <input type="password" id="r-password2" placeholder="Repeat Password">
        <i class="bi bi-eye eye" onclick="togglePwd('r-password2', this)"></i>
      </div>

      <div class="privacy-row">
        <label class="toggle-wrap">
          <input type="checkbox" id="r-privacy">
          <div class="toggle-slider"></div>
        </label>
        <span>Ho letto e accetto la <a href="#">Privacy Policy</a></span>
      </div>

      <button class="btn-main" id="btn-register" onclick="doRegister()">
        <span>Crea Account</span>
        <div class="spinner" id="spin-register"></div>
      </button>

      <div class="switch-link">Hai già un account? <a onclick="goScreen('login')"><strong>Accedi</strong></a></div>
    </div>

  </div><!-- /page -->

  <script>
    const BASE_URL = 'https://TUO-BASEURL-QUI'; // ⚠️ sostituisci con il tuo URL

    function goScreen(name) {
      document.querySelectorAll('.form-screen').forEach(s => s.classList.remove('active'));
      document.getElementById('screen-' + name).classList.add('active');
      hideAlert();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function togglePwd(id, icon) {
      const inp = document.getElementById(id);
      if (inp.type === 'password') {
        inp.type = 'text';
        icon.classList.replace('bi-eye', 'bi-eye-slash');
      } else {
        inp.type = 'password';
        icon.classList.replace('bi-eye-slash', 'bi-eye');
      }
    }

    function showAlert(msg, type = 'error') {
      const el = document.getElementById('alert');
      el.className = 'alert-box ' + type;
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideAlert() {
      document.getElementById('alert').style.display = 'none';
    }

    function setLoading(btnId, spinId, on) {
      document.getElementById(btnId).disabled = on;
      document.getElementById(spinId).style.display = on ? 'block' : 'none';
    }

    async function doLogin() {
      const email = document.getElementById('l-email').value.trim();
      const password = document.getElementById('l-password').value;
      if (!email || !password) return showAlert('Inserisci email e password.');

      setLoading('btn-login', 'spin-login', true);
      hideAlert();
      try {
        const res = await fetch(`${BASE_URL}/token/GetToken?email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`);
        if (!res.ok) throw new Error(await res.text() || 'Credenziali non valide.');
        const token = await res.text();
        localStorage.setItem('authToken', token);
        localStorage.setItem('userType', 'utente');
        showAlert('Accesso effettuato!', 'success');
        setTimeout(() => window.location.href = 'index.html', 1200);
      } catch(e) {
        showAlert(e.message || 'Errore di connessione.');
      } finally {
        setLoading('btn-login', 'spin-login', false);
      }
    }

    async function doRegister() {
      const nome = document.getElementById('r-nome').value.trim();
      const cognome = document.getElementById('r-cognome').value.trim();
      const email = document.getElementById('r-email').value.trim();
      const password = document.getElementById('r-password').value;
      const password2 = document.getElementById('r-password2').value;
      const privacy = document.getElementById('r-privacy').checked;

      if (!nome || !cognome || !email || !password) return showAlert('Compila tutti i campi.');
      if (password !== password2) return showAlert('Le password non coincidono.');
      if (!privacy) return showAlert('Devi accettare la Privacy Policy.');

      setLoading('btn-register', 'spin-register', true);
      hideAlert();
      try {
        const res = await fetch(`${BASE_URL}/user/Register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nome, cognome, email, password })
        });
        if (!res.ok) throw new Error(await res.text() || 'Registrazione fallita.');
        showAlert('Account creato! Ora accedi.', 'success');
        setTimeout(() => goScreen('login'), 1500);
      } catch(e) {
        showAlert(e.message || 'Errore di connessione.');
      } finally {
        setLoading('btn-register', 'spin-register', false);
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      if (document.getElementById('screen-login').classList.contains('active')) doLogin();
      else doRegister();
    });
  </script>
</body>
</html>
